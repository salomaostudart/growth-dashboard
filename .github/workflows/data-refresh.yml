name: Data Refresh

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 08:00 UTC (05:00 BRT)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  fetch-snapshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-analytics-data google-api-python-client google-auth

      - name: Fetch GA4 snapshot
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
        run: |
          printenv GCP_SERVICE_ACCOUNT_JSON > /tmp/service-account.json
          python scripts/fetch-ga4-snapshot.py

      - name: Fetch GSC snapshot
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
        run: python scripts/fetch-gsc-snapshot.py

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/service-account.json

      - name: Commit snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/snapshots/
          git diff --staged --quiet || git commit -m "chore: update data snapshots [skip ci]"
          git push
