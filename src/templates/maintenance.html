<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance | GrowthHQ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
      text-align: center;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      opacity: 0.7;
    }
    h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .status {
      display: inline-block;
      padding: 0.375rem 0.75rem;
      background: rgba(129, 140, 248, 0.1);
      border: 1px solid rgba(129, 140, 248, 0.2);
      border-radius: 6px;
      font-size: 0.8rem;
      color: #818cf8;
      margin-top: 1rem;
    }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Oswald:wght@600&display=swap');
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#9881;</div>
    <h1>Under Maintenance</h1>
    <p>We're making improvements to the dashboard. This won't take long.</p>
    <p>If you need immediate access, reach out directly.</p>
    <span class="status">Estimated return: shortly</span>
  </div>
</body>
</html>
